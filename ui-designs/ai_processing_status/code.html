<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI Processing Status</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              navy: {
                950: "#02040a",
                900: "#050a14",
                800: "#0b1221",
                700: "#142036",
              },
              accent: {
                DEFAULT: "#3b82f6", // Blue 500
                glow: "#60a5fa", // Blue 400
              }
            },
            fontFamily: {
              "display": ["Manrope", "sans-serif"]
            },
            animation: {
                'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                'scan-fast': 'scan 2.5s ease-in-out infinite',
                'spin-slow': 'spin 12s linear infinite',
                'ping-slow': 'ping 3s cubic-bezier(0, 0, 0.2, 1) infinite',
            },
            keyframes: {
                scan: {
                    '0%': { transform: 'translateY(-120%)', opacity: '0' },
                    '10%': { opacity: '1' },
                    '90%': { opacity: '1' },
                    '100%': { transform: 'translateY(200%)', opacity: '0' },
                },
                shimmer: {
                    '0%': { transform: 'translateX(-100%)' },
                    '100%': { transform: 'translateX(100%)' },
                }
            }
          },
        },
      }
    </script>
<style>.noise-bg {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuCskojjw5SMoa9dLZzFH7lCRM4hepJcD54CQkcVi-CxY_y2z1en7aCfqf2QWORlJT800or4cHRlkZe_XXTlmwBNuM0kB9Bf1aVdf5Y9OkwAy-lNWgng67mR3USL5ujd_zLsaaPnz82jo7cr51FXP3fZdNXXgppyke_AvqcFXblOArraGrXDPALcS_eKVUuddr0MK8mpSSNr70kmS86momAdP95owt9idUkOHV9qdsrLXGoZ8z11uxdOE3kJvvtgbxBJta3XqeVe-vI)
    }.glass-panel {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5)
    }
.material-symbols-outlined {
    font-variation-settings: "FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#050a14] text-white font-display min-h-screen flex flex-col relative overflow-hidden antialiased selection:bg-accent selection:text-white">
<div class="fixed top-[-10%] left-[-10%] w-[600px] h-[600px] bg-blue-600/10 rounded-full blur-[120px] pointer-events-none opacity-60"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-indigo-600/10 rounded-full blur-[100px] pointer-events-none opacity-50"></div>
<div class="fixed inset-0 pointer-events-none opacity-40 mix-blend-overlay noise-bg z-0"></div>
<header class="relative z-10 w-full p-6 flex justify-between items-center">
<div class="flex items-center gap-3 bg-white/5 pr-4 pl-1.5 py-1.5 rounded-full border border-white/5 backdrop-blur-sm">
<div class="w-7 h-7 rounded-full bg-emerald-500/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-emerald-400">security</span>
</div>
<span class="text-[11px] font-semibold tracking-wide text-white/70 uppercase">Private &amp; Offline</span>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center relative z-10 w-full max-w-sm mx-auto px-6 pb-12">
<div class="relative w-72 h-72 flex items-center justify-center mb-16">
<div class="absolute inset-0 rounded-full border border-accent/20 animate-ping-slow opacity-20"></div>
<div class="absolute inset-8 rounded-full border border-accent/10 animate-[ping_3s_cubic-bezier(0,0,0.2,1)_infinite_1.5s] opacity-20"></div>
<div class="absolute inset-20 rounded-full bg-accent/5 blur-3xl animate-pulse"></div>
<div class="absolute inset-0 rounded-full border border-white/5 border-t-accent/30 animate-spin-slow"></div>
<div class="relative w-32 h-44 glass-panel rounded-2xl flex flex-col items-center justify-center overflow-hidden group transform transition-transform duration-700 hover:scale-105">
<div class="flex flex-col items-center gap-3 opacity-80 z-10">
<div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[18px] text-white">receipt_long</span>
</div>
<div class="space-y-1.5 w-16">
<div class="h-1 bg-white/20 rounded-full w-full"></div>
<div class="h-1 bg-white/10 rounded-full w-2/3 mx-auto"></div>
<div class="h-1 bg-white/10 rounded-full w-4/5 mx-auto"></div>
</div>
<div class="h-px w-12 bg-white/10 my-1"></div>
<div class="h-1 bg-white/20 rounded-full w-10"></div>
</div>
<div class="absolute inset-0 w-full h-full bg-gradient-to-b from-transparent via-accent/30 to-transparent -translate-y-full animate-scan-fast z-20 pointer-events-none"></div>
<div class="absolute inset-0 bg-gradient-to-tr from-accent/10 to-transparent opacity-40"></div>
</div>
</div>
<div class="text-center mb-14 space-y-2">
<h1 class="text-3xl font-bold tracking-tight text-white drop-shadow-lg">Processing Receipt</h1>
<p class="text-white/50 text-sm font-medium">On-device AI is analyzing your receipt</p>
</div>
<div class="w-full relative pl-6">
<div class="absolute left-[31px] top-3 bottom-8 w-[1px] bg-white/10"></div>
<div class="relative flex items-start gap-5 pb-8 group">
<div class="relative z-10 flex items-center justify-center w-6 h-6 mt-0.5 rounded-full bg-accent shadow-[0_0_15px_rgba(59,130,246,0.4)] transition-all">
<span class="material-symbols-outlined text-[14px] text-white font-bold">check</span>
</div>
<div class="flex-1 pt-0.5">
<p class="text-sm font-semibold text-white leading-none">Extracting Text (OCR)</p>
<p class="text-xs text-accent/80 mt-1.5 font-medium">Found 14 text blocks</p>
</div>
</div>
<div class="relative flex items-start gap-5 pb-8 group">
<div class="relative z-10 flex items-center justify-center w-6 h-6 mt-0.5">
<div class="absolute inset-0 bg-accent/20 rounded-full animate-ping"></div>
<div class="relative w-2.5 h-2.5 bg-accent rounded-full shadow-[0_0_12px_rgba(59,130,246,0.9)] ring-4 ring-navy-900"></div>
</div>
<div class="flex-1 pt-0.5">
<div class="flex justify-between items-center mb-2">
<p class="text-sm font-semibold text-white leading-none">Parsing Items (AI)</p>
<span class="text-[10px] font-mono tracking-wider text-accent animate-pulse">PROCESSING</span>
</div>
<div class="h-[3px] w-full bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-accent w-2/3 relative">
<div class="absolute inset-0 bg-white/40 w-full animate-[shimmer_1.5s_infinite] -skew-x-12"></div>
</div>
</div>
</div>
</div>
<div class="relative flex items-start gap-5 opacity-40">
<div class="relative z-10 flex items-center justify-center w-6 h-6 mt-0.5 rounded-full bg-navy-900 border border-white/20">
</div>
<div class="flex-1 pt-0.5">
<p class="text-sm font-semibold text-white leading-none">Structuring Data</p>
<p class="text-xs text-white/50 mt-1.5">Waiting...</p>
</div>
</div>
</div>
</main>
<footer class="w-full p-8 flex justify-center relative z-10">
<button class="group flex items-center gap-2 px-5 py-2.5 rounded-full bg-white/5 hover:bg-white/10 border border-white/5 hover:border-white/10 transition-all active:scale-95">
<span class="material-symbols-outlined text-[18px] text-white/40 group-hover:text-white transition-colors">close</span>
<span class="text-xs font-semibold text-white/60 group-hover:text-white transition-colors tracking-wide">Cancel</span>
</button>
</footer>

</body></html>
